<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universo Interativo - Simulação de Partículas</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
            cursor: none;
        }

        canvas { display: block; }

        /* Custom cursor */
        #cursor {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            width: 30px;
            height: 30px;
            border: 2px solid rgba(0, 200, 255, 0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, border-color 0.2s;
            mix-blend-mode: screen;
        }
        #cursor.active {
            width: 50px;
            height: 50px;
            border-color: rgba(255, 100, 200, 0.9);
            box-shadow: 0 0 20px rgba(255, 100, 200, 0.4);
        }
        #cursor-dot {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            width: 6px;
            height: 6px;
            background: rgba(0, 200, 255, 1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(0, 200, 255, 0.8);
        }

        /* HUD */
        #hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 100;
            pointer-events: none;
        }

        .hud-left, .hud-right {
            pointer-events: auto;
        }

        .hud-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: rgba(0, 200, 255, 0.9);
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(0, 200, 255, 0.4);
        }

        .hud-subtitle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            margin-top: 4px;
        }

        .hud-stats {
            text-align: right;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            color: rgba(0, 200, 255, 0.6);
            letter-spacing: 1px;
        }

        .hud-stats div {
            margin-bottom: 4px;
        }

        .stat-value {
            color: rgba(0, 200, 255, 0.9);
            font-weight: 700;
        }

        /* Controls Panel */
        #controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 100;
            background: rgba(0, 10, 30, 0.7);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid rgba(0, 200, 255, 0.15);
        }

        .ctrl-btn {
            background: rgba(0, 200, 255, 0.08);
            border: 1px solid rgba(0, 200, 255, 0.2);
            color: rgba(0, 200, 255, 0.8);
            font-family: 'Rajdhani', sans-serif;
            font-size: 13px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .ctrl-btn:hover {
            background: rgba(0, 200, 255, 0.15);
            border-color: rgba(0, 200, 255, 0.5);
            box-shadow: 0 0 15px rgba(0, 200, 255, 0.2);
        }
        .ctrl-btn.active {
            background: rgba(0, 200, 255, 0.2);
            border-color: rgba(0, 200, 255, 0.7);
            color: #fff;
            box-shadow: 0 0 20px rgba(0, 200, 255, 0.3);
        }
        .ctrl-btn.danger {
            border-color: rgba(255, 60, 100, 0.3);
            color: rgba(255, 60, 100, 0.8);
        }
        .ctrl-btn.danger:hover {
            background: rgba(255, 60, 100, 0.15);
            border-color: rgba(255, 60, 100, 0.6);
            box-shadow: 0 0 15px rgba(255, 60, 100, 0.2);
        }
        .ctrl-btn.danger.active {
            background: rgba(255, 60, 100, 0.2);
            border-color: rgba(255, 60, 100, 0.7);
            color: #fff;
        }
        .ctrl-btn.gold {
            border-color: rgba(255, 200, 50, 0.3);
            color: rgba(255, 200, 50, 0.8);
        }
        .ctrl-btn.gold:hover {
            background: rgba(255, 200, 50, 0.15);
            border-color: rgba(255, 200, 50, 0.6);
        }
        .ctrl-btn.gold.active {
            background: rgba(255, 200, 50, 0.2);
            border-color: rgba(255, 200, 50, 0.7);
            color: #fff;
        }

        /* Side panel */
        #sidePanel {
            position: fixed;
            right: -320px;
            top: 50%;
            transform: translateY(-50%);
            width: 300px;
            background: rgba(0, 10, 30, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 200, 255, 0.15);
            border-radius: 16px;
            padding: 25px;
            z-index: 100;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #sidePanel.open {
            right: 20px;
        }

        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            color: rgba(0, 200, 255, 0.9);
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .slider-group {
            margin-bottom: 16px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 6px;
        }

        .slider-label span:last-child {
            color: rgba(0, 200, 255, 0.8);
            font-weight: 600;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(0, 200, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: rgba(0, 200, 255, 0.8);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 200, 255, 0.5);
        }

        /* Info overlay */
        #infoOverlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 200;
            pointer-events: none;
            opacity: 1;
            transition: opacity 1.5s ease;
        }
        #infoOverlay.hidden {
            opacity: 0;
        }

        .info-main {
            font-family: 'Orbitron', sans-serif;
            font-size: 42px;
            font-weight: 900;
            color: rgba(0, 200, 255, 0.9);
            text-shadow: 0 0 40px rgba(0, 200, 255, 0.4), 0 0 80px rgba(0, 200, 255, 0.2);
            letter-spacing: 8px;
            animation: glowPulse 2s ease-in-out infinite;
        }

        .info-sub {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 6px;
            margin-top: 12px;
            text-transform: uppercase;
        }

        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 40px rgba(0, 200, 255, 0.4), 0 0 80px rgba(0, 200, 255, 0.2); }
            50% { text-shadow: 0 0 60px rgba(0, 200, 255, 0.6), 0 0 120px rgba(0, 200, 255, 0.3); }
        }

        /* Mode indicator */
        #modeIndicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: rgba(0, 200, 255, 0.9);
            text-shadow: 0 0 30px rgba(0, 200, 255, 0.5);
            letter-spacing: 6px;
            text-transform: uppercase;
            z-index: 150;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #modeIndicator.show {
            opacity: 1;
            animation: fadeScale 1s ease forwards;
        }
        @keyframes fadeScale {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .info-main { font-size: 24px; letter-spacing: 4px; }
            .info-sub { font-size: 12px; letter-spacing: 3px; }
            .hud-title { font-size: 13px; letter-spacing: 2px; }
            #controls { padding: 8px 12px; gap: 4px; flex-wrap: wrap; justify-content: center; bottom: 15px; max-width: 95vw; }
            .ctrl-btn { font-size: 11px; padding: 6px 10px; }
            #sidePanel { width: 260px; padding: 18px; }
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- Custom Cursor -->
<div id="cursor"></div>
<div id="cursor-dot"></div>

<!-- HUD -->
<div id="hud">
    <div class="hud-left">
        <div class="hud-title">Universo Interativo</div>
        <div class="hud-subtitle">Simulação Gravitacional de Partículas</div>
    </div>
    <div class="hud-right">
        <div class="hud-stats">
            <div>PARTÍCULAS: <span class="stat-value" id="statParticles">0</span></div>
            <div>FPS: <span class="stat-value" id="statFps">0</span></div>
            <div>MODO: <span class="stat-value" id="statMode">ATRAIR</span></div>
            <div>ENERGIA: <span class="stat-value" id="statEnergy">0</span></div>
        </div>
    </div>
</div>

<!-- Intro Overlay -->
<div id="infoOverlay">
    <div class="info-main">UNIVERSO</div>
    <div class="info-sub">Mova o mouse para interagir</div>
</div>

<!-- Mode Indicator -->
<div id="modeIndicator"></div>

<!-- Controls -->
<div id="controls">
    <button class="ctrl-btn active" onclick="setMode('attract')" id="btnAttract">Atrair</button>
    <button class="ctrl-btn danger" onclick="setMode('repel')" id="btnRepel">Repelir</button>
    <button class="ctrl-btn gold" onclick="setMode('orbit')" id="btnOrbit">Orbitar</button>
    <button class="ctrl-btn" onclick="setMode('vortex')" id="btnVortex">Vórtex</button>
    <button class="ctrl-btn" onclick="spawnNebula()" id="btnNebula">Nebulosa</button>
    <button class="ctrl-btn" onclick="bigBang()">Big Bang</button>
    <button class="ctrl-btn" onclick="togglePanel()">Config</button>
</div>

<!-- Side Panel -->
<div id="sidePanel">
    <div class="panel-title">Configurações</div>

    <div class="slider-group">
        <div class="slider-label"><span>Partículas</span><span id="valParticles">3000</span></div>
        <input type="range" min="500" max="8000" value="3000" step="100" oninput="updateParticleCount(this.value)">
    </div>

    <div class="slider-group">
        <div class="slider-label"><span>Gravidade</span><span id="valGravity">1.0</span></div>
        <input type="range" min="0.1" max="5" value="1" step="0.1" oninput="config.gravity=parseFloat(this.value); document.getElementById('valGravity').textContent=this.value">
    </div>

    <div class="slider-group">
        <div class="slider-label"><span>Raio de Influência</span><span id="valRadius">200</span></div>
        <input type="range" min="50" max="500" value="200" step="10" oninput="config.influenceRadius=parseInt(this.value); document.getElementById('valRadius').textContent=this.value">
    </div>

    <div class="slider-group">
        <div class="slider-label"><span>Fricção</span><span id="valFriction">0.98</span></div>
        <input type="range" min="0.9" max="1" value="0.98" step="0.005" oninput="config.friction=parseFloat(this.value); document.getElementById('valFriction').textContent=this.value">
    </div>

    <div class="slider-group">
        <div class="slider-label"><span>Conexões</span><span id="valConnections">80</span></div>
        <input type="range" min="0" max="200" value="80" step="5" oninput="config.connectionDist=parseInt(this.value); document.getElementById('valConnections').textContent=this.value">
    </div>

    <div class="slider-group">
        <div class="slider-label"><span>Brilho Rastro</span><span id="valTrail">0.06</span></div>
        <input type="range" min="0.01" max="0.3" value="0.06" step="0.01" oninput="config.trailAlpha=parseFloat(this.value); document.getElementById('valTrail').textContent=this.value">
    </div>

    <div class="slider-group">
        <div class="slider-label"><span>Tamanho Base</span><span id="valSize">2.5</span></div>
        <input type="range" min="0.5" max="6" value="2.5" step="0.5" oninput="config.baseSize=parseFloat(this.value); document.getElementById('valSize').textContent=this.value">
    </div>
</div>

<script>
// ============ CANVAS SETUP ============
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ============ CONFIGURATION ============
const config = {
    particleCount: 3000,
    gravity: 1.0,
    influenceRadius: 200,
    friction: 0.98,
    connectionDist: 80,
    trailAlpha: 0.06,
    baseSize: 2.5
};

let mode = 'attract'; // attract, repel, orbit, vortex
let mouse = { x: canvas.width / 2, y: canvas.height / 2, active: false };
let particles = [];
let stars = [];
let nebulae = [];
let panelOpen = false;
let introVisible = true;
let frameCount = 0;
let fps = 0;
let lastFpsTime = performance.now();

// ============ COLOR PALETTES ============
const palettes = [
    // Cyan / Blue nebula
    { r: [0, 80], g: [150, 255], b: [200, 255] },
    // Pink / Magenta nebula
    { r: [200, 255], g: [50, 150], b: [150, 255] },
    // Gold / Orange nebula
    { r: [255, 255], g: [150, 220], b: [30, 80] },
    // Green nebula
    { r: [30, 100], g: [200, 255], b: [100, 180] },
    // Purple
    { r: [130, 200], g: [50, 120], b: [200, 255] },
];

function randomFromPalette(palette) {
    const p = palette || palettes[Math.floor(Math.random() * palettes.length)];
    return {
        r: p.r[0] + Math.random() * (p.r[1] - p.r[0]),
        g: p.g[0] + Math.random() * (p.g[1] - p.g[0]),
        b: p.b[0] + Math.random() * (p.b[1] - p.b[0])
    };
}

// ============ STAR FIELD ============
function createStars() {
    stars = [];
    for (let i = 0; i < 400; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 1.5,
            twinkle: Math.random() * Math.PI * 2,
            speed: 0.01 + Math.random() * 0.03
        });
    }
}
createStars();

// ============ PARTICLES ============
class Particle {
    constructor(x, y, palette) {
        this.x = x ?? Math.random() * canvas.width;
        this.y = y ?? Math.random() * canvas.height;
        this.vx = (Math.random() - 0.5) * 2;
        this.vy = (Math.random() - 0.5) * 2;
        const color = randomFromPalette(palette);
        this.r = color.r;
        this.g = color.g;
        this.b = color.b;
        this.baseAlpha = 0.4 + Math.random() * 0.6;
        this.alpha = this.baseAlpha;
        this.size = 0.5 + Math.random() * config.baseSize;
        this.life = 1;
        this.energy = 0;
        this.angle = Math.random() * Math.PI * 2;
    }

    update() {
        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const maxDist = config.influenceRadius;

        if (dist < maxDist && mouse.active) {
            const force = (1 - dist / maxDist) * config.gravity * 0.5;
            const angle = Math.atan2(dy, dx);
            this.energy = Math.min(1, this.energy + force * 0.1);

            switch (mode) {
                case 'attract':
                    this.vx += Math.cos(angle) * force;
                    this.vy += Math.sin(angle) * force;
                    break;
                case 'repel':
                    this.vx -= Math.cos(angle) * force * 1.5;
                    this.vy -= Math.sin(angle) * force * 1.5;
                    break;
                case 'orbit':
                    const perpAngle = angle + Math.PI / 2;
                    this.vx += Math.cos(perpAngle) * force * 0.8;
                    this.vy += Math.sin(perpAngle) * force * 0.8;
                    // Slight pull toward center
                    this.vx += Math.cos(angle) * force * 0.15;
                    this.vy += Math.sin(angle) * force * 0.15;
                    break;
                case 'vortex':
                    const vAngle = angle + Math.PI / 2;
                    const spiralForce = force * (1 + (1 - dist / maxDist) * 2);
                    this.vx += Math.cos(vAngle) * spiralForce * 0.6;
                    this.vy += Math.sin(vAngle) * spiralForce * 0.6;
                    this.vx += Math.cos(angle) * spiralForce * 0.3;
                    this.vy += Math.sin(angle) * spiralForce * 0.3;
                    break;
            }
        }

        this.energy *= 0.97;
        this.vx *= config.friction;
        this.vy *= config.friction;
        this.x += this.vx;
        this.y += this.vy;

        // Wrap around edges
        if (this.x < -50) this.x = canvas.width + 50;
        if (this.x > canvas.width + 50) this.x = -50;
        if (this.y < -50) this.y = canvas.height + 50;
        if (this.y > canvas.height + 50) this.y = -50;

        // Glow when energized
        this.alpha = this.baseAlpha + this.energy * 0.5;
    }

    draw() {
        const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
        const sizeMod = this.size + this.energy * 3 + speed * 0.3;

        // Glow effect for energized particles
        if (this.energy > 0.2) {
            ctx.beginPath();
            const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, sizeMod * 4);
            grad.addColorStop(0, `rgba(${this.r}, ${this.g}, ${this.b}, ${this.energy * 0.3})`);
            grad.addColorStop(1, `rgba(${this.r}, ${this.g}, ${this.b}, 0)`);
            ctx.fillStyle = grad;
            ctx.arc(this.x, this.y, sizeMod * 4, 0, Math.PI * 2);
            ctx.fill();
        }

        // Main particle
        ctx.beginPath();
        ctx.fillStyle = `rgba(${this.r}, ${this.g}, ${this.b}, ${this.alpha})`;
        ctx.arc(this.x, this.y, sizeMod, 0, Math.PI * 2);
        ctx.fill();
    }
}

// ============ NEBULA CLASS ============
class Nebula {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.radius = 0;
        this.maxRadius = 150 + Math.random() * 200;
        this.palette = palettes[Math.floor(Math.random() * palettes.length)];
        this.alpha = 0.4;
        this.life = 1;
        this.expanding = true;
        this.layers = [];

        for (let i = 0; i < 5; i++) {
            const c = randomFromPalette(this.palette);
            this.layers.push({
                offsetX: (Math.random() - 0.5) * 60,
                offsetY: (Math.random() - 0.5) * 60,
                radiusMod: 0.5 + Math.random() * 0.5,
                r: c.r, g: c.g, b: c.b,
                alpha: 0.1 + Math.random() * 0.15,
                rotation: Math.random() * Math.PI * 2,
                rotSpeed: (Math.random() - 0.5) * 0.005
            });
        }
    }

    update() {
        if (this.expanding && this.radius < this.maxRadius) {
            this.radius += (this.maxRadius - this.radius) * 0.02;
            if (this.radius > this.maxRadius * 0.95) this.expanding = false;
        } else {
            this.life -= 0.001;
            this.alpha = this.life * 0.4;
        }

        this.layers.forEach(l => l.rotation += l.rotSpeed);
    }

    draw() {
        if (this.alpha <= 0) return;

        this.layers.forEach(layer => {
            const lx = this.x + layer.offsetX;
            const ly = this.y + layer.offsetY;
            const lr = this.radius * layer.radiusMod;

            const grad = ctx.createRadialGradient(lx, ly, 0, lx, ly, lr);
            grad.addColorStop(0, `rgba(${layer.r}, ${layer.g}, ${layer.b}, ${layer.alpha * this.life})`);
            grad.addColorStop(0.5, `rgba(${layer.r}, ${layer.g}, ${layer.b}, ${layer.alpha * 0.3 * this.life})`);
            grad.addColorStop(1, `rgba(${layer.r}, ${layer.g}, ${layer.b}, 0)`);

            ctx.beginPath();
            ctx.fillStyle = grad;
            ctx.arc(lx, ly, lr, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    isDead() {
        return this.life <= 0;
    }
}

// ============ INIT PARTICLES ============
function initParticles(count) {
    particles = [];
    for (let i = 0; i < count; i++) {
        particles.push(new Particle());
    }
}
initParticles(config.particleCount);

// ============ CONNECTIONS ============
function drawConnections() {
    if (config.connectionDist <= 0) return;

    const maxDist = config.connectionDist;
    const maxDistSq = maxDist * maxDist;

    // Only check particles near the mouse for performance
    const nearParticles = particles.filter(p => {
        const dx = p.x - mouse.x;
        const dy = p.y - mouse.y;
        return dx * dx + dy * dy < 40000; // Within 200px of mouse
    });

    for (let i = 0; i < nearParticles.length; i++) {
        for (let j = i + 1; j < nearParticles.length; j++) {
            const dx = nearParticles[i].x - nearParticles[j].x;
            const dy = nearParticles[i].y - nearParticles[j].y;
            const distSq = dx * dx + dy * dy;

            if (distSq < maxDistSq) {
                const dist = Math.sqrt(distSq);
                const alpha = (1 - dist / maxDist) * 0.15;
                const avgR = (nearParticles[i].r + nearParticles[j].r) / 2;
                const avgG = (nearParticles[i].g + nearParticles[j].g) / 2;
                const avgB = (nearParticles[i].b + nearParticles[j].b) / 2;

                ctx.beginPath();
                ctx.strokeStyle = `rgba(${avgR}, ${avgG}, ${avgB}, ${alpha})`;
                ctx.lineWidth = 0.5;
                ctx.moveTo(nearParticles[i].x, nearParticles[i].y);
                ctx.lineTo(nearParticles[j].x, nearParticles[j].y);
                ctx.stroke();
            }
        }
    }
}

// ============ MOUSE FIELD VISUALIZATION ============
function drawMouseField() {
    if (!mouse.active) return;

    const r = config.influenceRadius;

    // Outer ring
    ctx.beginPath();
    ctx.strokeStyle = mode === 'repel'
        ? 'rgba(255, 60, 100, 0.1)'
        : mode === 'orbit'
        ? 'rgba(255, 200, 50, 0.1)'
        : 'rgba(0, 200, 255, 0.1)';
    ctx.lineWidth = 1;
    ctx.arc(mouse.x, mouse.y, r, 0, Math.PI * 2);
    ctx.stroke();

    // Inner glow
    const grad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, r * 0.3);
    const glowColor = mode === 'repel'
        ? '255, 60, 100'
        : mode === 'orbit'
        ? '255, 200, 50'
        : mode === 'vortex'
        ? '150, 100, 255'
        : '0, 200, 255';
    grad.addColorStop(0, `rgba(${glowColor}, 0.08)`);
    grad.addColorStop(1, `rgba(${glowColor}, 0)`);
    ctx.beginPath();
    ctx.fillStyle = grad;
    ctx.arc(mouse.x, mouse.y, r * 0.3, 0, Math.PI * 2);
    ctx.fill();
}

// ============ STAR RENDERING ============
function drawStars() {
    const time = performance.now() * 0.001;
    stars.forEach(s => {
        const twinkle = 0.3 + Math.sin(time * s.speed * 10 + s.twinkle) * 0.7;
        ctx.beginPath();
        ctx.fillStyle = `rgba(255, 255, 255, ${twinkle * 0.4})`;
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fill();
    });
}

// ============ MAIN LOOP ============
function animate() {
    // Trail effect
    ctx.fillStyle = `rgba(0, 0, 5, ${config.trailAlpha})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawStars();

    // Nebulae
    nebulae.forEach(n => { n.update(); n.draw(); });
    nebulae = nebulae.filter(n => !n.isDead());

    // Particles
    particles.forEach(p => { p.update(); p.draw(); });

    drawConnections();
    drawMouseField();

    // FPS counter
    frameCount++;
    const now = performance.now();
    if (now - lastFpsTime >= 1000) {
        fps = frameCount;
        frameCount = 0;
        lastFpsTime = now;
        updateHud();
    }

    requestAnimationFrame(animate);
}

// ============ HUD UPDATE ============
function updateHud() {
    document.getElementById('statParticles').textContent = particles.length;
    document.getElementById('statFps').textContent = fps;
    document.getElementById('statMode').textContent = mode.toUpperCase();

    const totalEnergy = particles.reduce((sum, p) => sum + Math.sqrt(p.vx * p.vx + p.vy * p.vy), 0);
    document.getElementById('statEnergy').textContent = Math.round(totalEnergy);
}

// ============ CONTROLS ============
function setMode(m) {
    mode = m;
    document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
    const btnMap = { attract: 'btnAttract', repel: 'btnRepel', orbit: 'btnOrbit', vortex: 'btnVortex' };
    if (btnMap[m]) document.getElementById(btnMap[m]).classList.add('active');

    showModeIndicator(m);
}

function showModeIndicator(m) {
    const names = { attract: 'ATRAIR', repel: 'REPELIR', orbit: 'ORBITAR', vortex: 'VÓRTEX' };
    const el = document.getElementById('modeIndicator');
    el.textContent = names[m] || m;
    el.className = '';
    void el.offsetWidth;
    el.className = 'show';
}

function spawnNebula() {
    nebulae.push(new Nebula(
        canvas.width * 0.2 + Math.random() * canvas.width * 0.6,
        canvas.height * 0.2 + Math.random() * canvas.height * 0.6
    ));

    // Spawn particles from nebula
    const palette = palettes[Math.floor(Math.random() * palettes.length)];
    const cx = canvas.width / 2 + (Math.random() - 0.5) * canvas.width * 0.4;
    const cy = canvas.height / 2 + (Math.random() - 0.5) * canvas.height * 0.4;

    for (let i = 0; i < 100; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * 80;
        const p = new Particle(cx + Math.cos(angle) * dist, cy + Math.sin(angle) * dist, palette);
        p.vx = Math.cos(angle) * (1 + Math.random() * 3);
        p.vy = Math.sin(angle) * (1 + Math.random() * 3);
        p.energy = 0.8;
        particles.push(p);
    }

    // Trim if too many
    if (particles.length > 10000) {
        particles = particles.slice(particles.length - 10000);
    }
}

function bigBang() {
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    // Flash
    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Reset all particles from center
    const palette = palettes[Math.floor(Math.random() * palettes.length)];
    particles = [];

    for (let i = 0; i < config.particleCount; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 15;
        const p = new Particle(cx + (Math.random() - 0.5) * 10, cy + (Math.random() - 0.5) * 10, palette);
        p.vx = Math.cos(angle) * speed;
        p.vy = Math.sin(angle) * speed;
        p.energy = 1;
        particles.push(p);
    }

    // Spawn multiple nebulae
    for (let i = 0; i < 3; i++) {
        nebulae.push(new Nebula(cx + (Math.random() - 0.5) * 200, cy + (Math.random() - 0.5) * 200));
    }

    showModeIndicator('BIG BANG');
}

function togglePanel() {
    panelOpen = !panelOpen;
    document.getElementById('sidePanel').classList.toggle('open', panelOpen);
}

function updateParticleCount(val) {
    document.getElementById('valParticles').textContent = val;
    const target = parseInt(val);
    if (target > particles.length) {
        for (let i = particles.length; i < target; i++) {
            particles.push(new Particle());
        }
    } else {
        particles = particles.slice(0, target);
    }
    config.particleCount = target;
}

// ============ MOUSE EVENTS ============
document.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    mouse.active = true;

    document.getElementById('cursor').style.left = e.clientX + 'px';
    document.getElementById('cursor').style.top = e.clientY + 'px';
    document.getElementById('cursor-dot').style.left = e.clientX + 'px';
    document.getElementById('cursor-dot').style.top = e.clientY + 'px';

    if (introVisible) {
        introVisible = false;
        document.getElementById('infoOverlay').classList.add('hidden');
    }
});

document.addEventListener('mousedown', () => {
    document.getElementById('cursor').classList.add('active');
    config.gravity *= 3;
});

document.addEventListener('mouseup', () => {
    document.getElementById('cursor').classList.remove('active');
    config.gravity /= 3;
});

// Touch support
document.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    mouse.x = touch.clientX;
    mouse.y = touch.clientY;
    mouse.active = true;

    if (introVisible) {
        introVisible = false;
        document.getElementById('infoOverlay').classList.add('hidden');
    }
}, { passive: false });

document.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    mouse.x = touch.clientX;
    mouse.y = touch.clientY;
    mouse.active = true;
    config.gravity *= 3;
});

document.addEventListener('touchend', () => {
    config.gravity /= 3;
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    switch(e.key) {
        case '1': setMode('attract'); break;
        case '2': setMode('repel'); break;
        case '3': setMode('orbit'); break;
        case '4': setMode('vortex'); break;
        case 'n': case 'N': spawnNebula(); break;
        case 'b': case 'B': bigBang(); break;
        case 'c': case 'C': togglePanel(); break;
    }
});

// ============ START ============
animate();

// Initial nebula after a moment
setTimeout(() => {
    nebulae.push(new Nebula(canvas.width * 0.3, canvas.height * 0.4));
    nebulae.push(new Nebula(canvas.width * 0.7, canvas.height * 0.6));
}, 500);
</script>
